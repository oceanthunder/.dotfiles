#keybindings
bindsym $mod+Shift+f exec firefox
bindsym $mod+Shift+p exec firefox --private-window
bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set 5%+
bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 5%-
bindsym $mod+Shift+d exec --no-startup-id brightnessctl set 5%+
bindsym $mod+Shift+a exec --no-startup-id brightnessctl set 5%-
bindsym $mod+Shift+x exec --no-startup-id i3lock -c 000000
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +5% && $refresh_i3status
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -5% && $refresh_i3status
bindsym $mod+Shift+w exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +5% && $refresh_i3status
bindsym $mod+Shift+s exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -5% && $refresh_i3status
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
bindsym XF86AudioMicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status
bindsym $mod+Shift+m exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
bindsym $mod+Shift+n exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status
bindsym $mod+Return exec i3-sensible-terminal
bindsym $mod+Shift+q kill
bindsym $mod+d exec --no-startup-id dmenu_run -fn 'Noto Sans:size=10' -nb '#000000' -nf '#ffffff' -sb '#ffffff' -sf '#000000'
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right
bindsym $mod+b split h
bindsym $mod+v split v
bindsym $mod+f fullscreen toggle
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle
bindsym $mod+a focus parent
bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5
bindsym $mod+6 workspace number $ws6
bindsym $mod+7 workspace number $ws7
bindsym $mod+8 workspace number $ws8
bindsym $mod+9 workspace number $ws9
bindsym $mod+0 workspace number $ws10
bindsym $mod+Shift+1 move container to workspace number $ws1
bindsym $mod+Shift+2 move container to workspace number $ws2
bindsym $mod+Shift+3 move container to workspace number $ws3
bindsym $mod+Shift+4 move container to workspace number $ws4
bindsym $mod+Shift+5 move container to workspace number $ws5
bindsym $mod+Shift+6 move container to workspace number $ws6
bindsym $mod+Shift+7 move container to workspace number $ws7
bindsym $mod+Shift+8 move container to workspace number $ws8
bindsym $mod+Shift+9 move container to workspace number $ws9
bindsym $mod+Shift+0 move container to workspace number $ws10
bindsym $mod+Shift+c reload
bindsym $mod+Shift+r restart
bindsym $mod+Shift+e exec --no-startup-id bash -c "[ \$(echo -e 'No\nYes' | dmenu -fn 'Noto Sans:size=10' -i -p 'Exit i3wm?' -nb '#000000' -nf '#ffffff' -sb '#ffffff' -sf '#000000') = 'Yes' ] && i3-msg exit"
bindsym $mod+r mode "resize"
bindsym Print exec flameshot
mode "resize" {
        bindsym h resize shrink width 10 px or 10 ppt
        bindsym j resize grow height 10 px or 10 ppt
        bindsym k resize shrink height 10 px or 10 ppt
        bindsym l resize grow width 10 px or 10 ppt
        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}


#startup commands
exec --no-startup-id dex --autostart --environment i3
exec --no-startup-id xss-lock --transfer-sleep-lock -- i3lock --nofork
exec_always --no-startup-id picom -b --config ~/.config/picom/picom.conf


#i3bar
client.focused          #ffffff #ffffff #000000 #000000   #ffffff
client.focused_inactive #1a1a1a #1a1a1a #ffffff #1a1a1a   #1a1a1a
client.unfocused        #000000 #000000 #ffffff #000000   #000000
client.urgent           #ffffff #ffffff #000000 #ffffff   #ffffff
client.placeholder      #000000 #000000 #ffffff #000000   #000000
bar {
    position bottom
    status_command i3status
    colors {
        background #000000
        separator  #ffffff
        focused_workspace  #ffffff #ffffff #000000
        active_workspace   #333333 #333333 #ffffff
        inactive_workspace #000000 #000000 #ffffff
        urgent_workspace   #ffffff #ffffff #000000
        binding_mode       #ffffff #ffffff #000000
    }
}


#defaults
workspace_layout tabbed
set $mod Mod4
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"
font pango:Noto Sans 9
set $refresh_i3status killall -SIGUSR1 i3status
floating_modifier $mod
tiling_drag modifier titlebar
